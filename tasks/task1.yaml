# need to create pod name web-pod with image busybox and it should sleep for 3200 and allow the pod to able to allow system time.
# k run web-pod --image=busybox --command sleep 3200 --dry-run=client -o yaml :-  this will give a yaml for pod web-pod with image busybox and sleep 3200

apiVersion: v1
kind: Pod
metadata:
  labels:
    run: web-pod
  name: web-pod
spec:
  containers:
  - command:
    - sleep
    - "3200"
    image: busybox
    name: web-pod
    securityContext:
      capabilities:
        add: ["SYS_TIME"]
    resources: {}
  dnsPolicy: ClusterFirst
  restartPolicy: Always
status: {}


