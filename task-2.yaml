# k create deployment myproject --image=nginx:1.16 --replicas=1 --dry-run=client -o yaml

apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app: myproject
  name: myproject
spec:
  replicas: 1
  selector:
    matchLabels:
      app: myproject
  strategy: {}
  template:
    metadata:
      labels:
        app: myproject
    spec:
      containers:
      - image: nginx:1.16
        name: nginx
        resources: {}
status: {}